name: Build GKI 5.15 Modules (K60 Pro)
on:
  workflow_dispatch:
  push:
    branches: [master, main]
permissions:
  contents: read
env:
  GKI_BRANCH: android13-5.15
  GKI_COMMIT: 742fd6fce289
  ARCH: arm64
  LLVM: "1"
jobs:
  build-ko:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          path: driver
      - name: Install deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential bc bison flex libssl-dev libelf-dev git wget curl ca-certificates python3 rsync cpio unzip zip xz-utils lz4 zstd gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu dwarves
      - name: Cache clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: toolchains/clang
          key: android-clang-r450784e-v1
      - name: Get Android Clang r450784e
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          set -eux
          mkdir -p toolchains/clang
          URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784e.tar.gz"
          wget -O /tmp/clang.tar.gz "$URL" || wget -O /tmp/clang.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/master/clang-r450784e.tar.gz"
          tar -xzf /tmp/clang.tar.gz -C toolchains/clang
          if [ ! -x toolchains/clang/bin/clang ]; then
            SUB=$(find toolchains/clang -type f -name clang -path '*/bin/clang' | head -n1)
            ROOT=$(dirname "$(dirname "$SUB")")
            mkdir -p /tmp/clang-norm && cp -a "$ROOT"/. /tmp/clang-norm/ && rm -rf toolchains/clang && mv /tmp/clang-norm toolchains/clang
          fi
          toolchains/clang/bin/clang --version
      - name: Cache GKI sources
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: kernel/common
          key: gki-common-android13-5.15-742fd6fce289-v1
      - name: Fetch Google kernel/common GKI
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          set -eux
          mkdir -p kernel
          git clone --filter=blob:none --no-checkout https://android.googlesource.com/kernel/common kernel/common
          cd kernel/common
          git fetch --depth 1 origin "$GKI_COMMIT" || git fetch --depth 1 origin "$GKI_BRANCH"
          if git cat-file -t "$GKI_COMMIT" >/dev/null 2>&1; then git checkout --force "$GKI_COMMIT"; else git checkout --force FETCH_HEAD; fi
          git log -1 --oneline
      - name: modules_prepare
        run: |
          set -eux
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          cd kernel/common
          if [ -f arch/arm64/configs/gki_defconfig ]; then make LLVM=1 ARCH=arm64 gki_defconfig
          elif [ -f arch/arm64/configs/gki_aarch64_defconfig ]; then make LLVM=1 ARCH=arm64 gki_aarch64_defconfig
          else make LLVM=1 ARCH=arm64 defconfig; fi
          scripts/config --enable CONFIG_MODULES || true
          scripts/config --enable CONFIG_MODULE_UNLOAD || true
          scripts/config --enable CONFIG_KALLSYMS || true
          scripts/config --enable CONFIG_KALLSYMS_ALL || true
          scripts/config --enable CONFIG_PERF_EVENTS || true
          scripts/config --disable CONFIG_MODULE_SIG_FORCE || true
          scripts/config --disable CONFIG_TRIM_UNUSED_KSYMS || true
          scripts/config --disable CONFIG_LTO_CLANG_FULL || true
          scripts/config --disable CONFIG_LTO_CLANG_THIN || true
          scripts/config --enable CONFIG_LTO_NONE || true
          scripts/config --disable CONFIG_CFI_CLANG || true
          scripts/config --disable CONFIG_CFI || true
          make LLVM=1 ARCH=arm64 olddefconfig
          make LLVM=1 ARCH=arm64 modules_prepare -j"$(nproc)"
          test -f include/generated/autoconf.h
          test -f Module.symvers || touch Module.symvers
      - name: Force version macros 5.15.189
        run: |
          for f in driver/hwBreakpointProcModule/hwBreakpointProc_module/ver_control.h driver/rwProcMem33Module/rwProcMem_module/ver_control.h; do
            sed -i 's/#define MY_LINUX_VERSION_CODE KERNEL_VERSION([^)]*)/#define MY_LINUX_VERSION_CODE KERNEL_VERSION(5,15,189)/' "$f"
            grep 'MY_LINUX_VERSION_CODE KERNEL_VERSION(5,15,189)' "$f"
          done
      - name: Build both .ko
        run: |
          set -eux
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          KDIR="$GITHUB_WORKSPACE/kernel/common"
          for MDIR in \
            "$GITHUB_WORKSPACE/driver/hwBreakpointProcModule/hwBreakpointProc_module" \
            "$GITHUB_WORKSPACE/driver/rwProcMem33Module/rwProcMem_module"
          do
            make -C "$KDIR" M="$MDIR" ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CLANG_TRIPLE=aarch64-linux-gnu- modules -j"$(nproc)"
          done
          mkdir -p out/ko
          cp -v driver/hwBreakpointProcModule/hwBreakpointProc_module/*.ko out/ko/
          cp -v driver/rwProcMem33Module/rwProcMem_module/*.ko out/ko/
          {
            echo "device=Redmi K60 Pro"
            echo "uname=5.15.189-android13-8-00012-g742fd6fce289-ab14327796"
            echo "gki_commit_requested=$GKI_COMMIT"
            echo "gki_commit_built=$(git -C kernel/common rev-parse HEAD)"
            echo "clang=$(toolchains/clang/bin/clang --version | head -n1)"
            echo "warning=CI disables CFI/LTO for OOT build; device kernel may still reject or crash if KMI/CFI mismatch"
          } | tee out/ko/BUILD_INFO.txt
          ls -la out/ko
      - uses: actions/upload-artifact@v4
        with:
          name: k60pro-gki515-ko
          path: out/ko/
          if-no-files-found: error
  build-userspace:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
          add-to-path: true
      - name: ndk-build demos
        env:
          NDK: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -eux
          "$NDK/ndk-build" -C hwBreakpointProcModule/testHwBp -j"$(nproc)"
          "$NDK/ndk-build" -C hwBreakpointProcModule/testHwBpServer -j"$(nproc)" || true
          "$NDK/ndk-build" -C rwProcMem33Module/testKo -j"$(nproc)" || true
          mkdir -p out/userspace
          find . -type f -path '*/libs/arm64-v8a/*' -exec cp -v {} out/userspace/ \;
          ls -la out/userspace
      - uses: actions/upload-artifact@v4
        with:
          name: k60pro-userspace-arm64
          path: out/userspace/
          if-no-files-found: warn